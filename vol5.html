<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<style>
:root{--primary:#1f6f8b;--primary-dark:#155263;--accent:#e76f51;--bg:#f6f4ef;--card:#fff;--ink:#2b2b2b;--line:#e5e1d8;--muted:#7a756c}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Noto Sans TC","Microsoft JhengHei",sans-serif;line-height:1.7}
.hero{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;padding:52px 20px 44px;text-align:center}
.hero .kicker{letter-spacing:.35em;font-size:13px;opacity:.85;margin:0 0 12px}
.hero h1{margin:0 0 8px;font-size:32px}
.hero p{margin:0;font-size:16px;opacity:.9}
.wrap{max-width:960px;margin:0 auto;padding:22px 20px 70px}
.backbar{margin:0 0 26px}
.backbar a{display:inline-flex;align-items:center;gap:7px;color:var(--primary-dark);text-decoration:none;font-weight:700;font-size:15px;background:#fff;border:1px solid var(--line);padding:8px 16px;border-radius:999px;box-shadow:0 1px 3px rgba(0,0,0,.05);transition:.15s}
.backbar a:hover{background:var(--primary);color:#fff;border-color:var(--primary)}
.sec-title{display:flex;align-items:baseline;gap:12px;margin:0 0 22px}
.sec-title b{font-size:20px}
.sec-title span{color:var(--muted);font-size:14px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:22px}
.card{position:relative;display:block;background:var(--card);border-radius:18px;overflow:hidden;text-decoration:none;color:inherit;box-shadow:0 4px 16px rgba(31,111,139,.10);border:1px solid var(--line);transition:transform .18s,box-shadow .18s}
.card:hover{transform:translateY(-6px);box-shadow:0 12px 28px rgba(31,111,139,.20)}
.card .top{position:relative;height:132px;background:linear-gradient(135deg,#e8895f,#c9502f);overflow:hidden}
.card .top .emoji{position:absolute;left:22px;top:50%;transform:translateY(-50%);font-size:54px;filter:drop-shadow(0 3px 8px rgba(0,0,0,.25))}
.card .top .dot{position:absolute;border-radius:50%;background:rgba(255,255,255,.16)}
.card .top .d1{width:90px;height:90px;right:-18px;top:-24px}
.card .top .d2{width:52px;height:52px;right:44px;bottom:-16px}
.card .top .tri{position:absolute;right:0;top:0;border-width:0 44px 44px 0;border-style:solid;border-color:transparent var(--primary) transparent transparent;opacity:.9}
.card .body{padding:18px 20px 22px}
.card .body .en{color:var(--accent);font-weight:700;font-size:13px;letter-spacing:.06em;margin:0 0 4px}
.card .body h3{margin:0 0 6px;font-size:20px}
.card .body .meta{margin:0;color:var(--muted);font-size:14px}
.card .go{position:absolute;right:16px;bottom:16px;color:var(--primary);font-weight:700;font-size:14px}
footer{text-align:center;color:var(--muted);font-size:13px;padding:30px 20px 50px;border-top:1px solid var(--line)}
@media(max-width:520px){.hero h1{font-size:26px}}
</style></head>
<body>
<header class="hero">
  <p class="kicker">VOLUME 5 · GRADE 9</p>
  <h1>第五冊　國三上</h1>
  <p>相似形　·　章節互動講義</p>
</header>
<div class="wrap">

  <div class="sec-title"><b>章節 Chapters</b><span>點選章節進入互動講義</span></div>
  <div class="grid">
    <a class="card" href="ch1.html">
      <div class="top">
        <span class="dot d1"></span><span class="dot d2"></span>
        <span class="tri"></span>
        <span class="emoji">📐</span>
      </div>
      <div class="body">
        <p class="en">CHAPTER 1</p>
        <h3>第一章　相似形</h3>
        <p class="meta">Similar Figures · 分節互動講義</p>
      </div>
      <span class="go">開始 →</span>
    </a>
  </div>
</div>
<footer>© EFETL 全民補習班　·　newmath.efetl.com</footer>
</body></html>
